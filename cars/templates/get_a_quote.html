{% extends 'base.html' %}

{% block title %}
Get A Quote - Cars
{% endblock %}

{% block content %}

<!-- Page Title -->
<div class="page-title dark-background">
  <div class="container position-relative">
    <h1>Get a Quote</h1>
    <p>Request a transport quote from Brotherhood Motors.</p>
  </div>
</div>

<!-- Get A Quote Section -->
<section id="get-a-quote" class="get-a-quote section">
  <div class="container">

    <div class="row g-4">

      <div class="col-lg-5 bg-light p-4">
        <h4>Why Choose Us?</h4>
        <p>We offer reliable and affordable vehicle transport services across Kenya.</p>
      </div>

      <div class="col-lg-7">
        <form method="post">
          {% csrf_token %}

          <div class="row gy-3">

            <div class="col-md-6">
              <input type="text" name="departure" class="form-control" placeholder="City of Departure">
            </div>

            <div class="col-md-6">
              <input type="text" name="delivery" class="form-control" placeholder="Delivery City">
            </div>

            <div class="col-md-6">
              <input type="text" name="weight" class="form-control" placeholder="Total Weight (kg)">
            </div>

            <div class="col-md-6">
              <input type="text" name="dimensions" class="form-control" placeholder="Dimensions (cm)">
            </div>

            <div class="col-12">
              <h5>Your Details</h5>
            </div>

            <div class="col-12">
              <input type="text" name="name" class="form-control" placeholder="Name">
            </div>

            <div class="col-12">
              <input type="email" name="email" class="form-control" placeholder="Email">
            </div>

            <div class="col-12">
              <input type="text" name="phone" class="form-control" placeholder="Phone">
            </div>

            <div class="col-12">
              <textarea name="message" rows="5" class="form-control" placeholder="Message"></textarea>
            </div>

            <div class="col-12 text-center">
              <button type="submit" class="btn btn-primary">Get a Quote</button>
            </div>

          </div>
        </form>
      </div>

    </div>

  </div>
</section>

{% endblock %}
